<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <style>
    body {
      font-family: Arial;
      padding: 1rem;
      font-size: 14px;
    }
    header {
      text-align: center;
    }
    form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      width: 500px;
      margin: 0 auto;
    }
    label {
      margin-bottom:8px;
      font-weight: bold;
    }
    label,
    input:not([type=checkbox]),
    select {
      display: block;
      width: 100%;
    }
  </style>
</head>

<body>
  <header>
    <h1>EC Tracking</h1>
    <div>
      <strong>Available Demos:</strong>
      <a href="/form-autofill.html">Autofill</a> | <a href="/marketo-blind-form.html">Marketo Blind Form</a> | <a href="/heap-autofill.html">Auto Heap Identify</a> | <a href="/marketo-form.html">Marketo Form</a> | <a href="/kiosk-mode.html">Kiosk Mode</a>
    </div>
    <div>
      <strong>Tools:</strong> 
      <a href="/marketo-blind-form.html?utm_campaign=latest_test&utm_source=twitter&utm_medium=share&utm_content=awesome-content&utm_term=catchy+phrase&utm_device=desktop&msid=testing-msid&custom_param=latestcustom+cookie+value">Add Params</a> | <a href="/marketo-blind-form.html">Remove Params</a></div>
      <h2>Automatic Heap Autofill:</h2>
      <small>Automatically grabs email, converts to UUID, and populates UUID field on submit.</small>
  </header>

  <section class="w-100 mw9 center">
    <form action="#" id="test-form">
      <div>
        <label for="email">Email</label>
        <input type="email" name="email" id="email" />
      </div>
      
      <div>
        <label for="first_name">First Name</label>
        <input type="text" name="first_name" id="first_name" />
      </div>
      
      <div>
        <label for="last_name">Last Name</label>
        <input type="text" name="last_name" id="last_name" />
      </div>
      
      <div>
        <label for="company">Company</label>
        <input type="text" name="company" id="company" />
      </div>

      <div>
        <label for="country">Country</label>
        <select id="country" name="country">
          <option value="">Select...</option>
          <option value="United States">United States</option>
          <option value="Canada">Canada</option>
          <option value="United Kingdom">United Kingdom</option>
        </select>
      </div>

      <div>
        <label for="heap_id">Heap UUID</label>
        <input type="text" name="heap_id" id="heap_id" />
      </div>

      <div>
        <label for="opt-in"><input type="checkbox" name="opt-in" id="opt-in"> Opt In</label>
      </div>
        
      <input type="submit" value="Submit">
    </form>
  </section>

  <!-- BEGIN: EC Demo Tracking -->
  <script>
    (function(){var a = document.createElement('script'); 
    a.type="text/javascript";a.async=true;
    a.src="/ec.min.js"; 
    document.body.appendChild(a);})();
  </script>
  <!-- END: EC Demo Tracking -->



  <script>
    window.addEventListener('load', function() {
      $EC.debug = true;

      // Example only, should only identify on successful form submissions, before page reloads.
      document.querySelector("#test-form").addEventListener("submit", function(e) {
        e.preventDefault();
        const email = document.querySelector("input[name=email]").value;
        const heapIdField = document.querySelector("input[name=heap_id]");
        const uuid = $EC.heap.identify(email);
        heapIdField.value = uuid;
      });
    });
  </script>
</body>
</html>
